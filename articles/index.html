<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="description" content="北海道の地域課題に関する読み解きとアイデアの記事一覧。週次更新。">

<meta property="og:description" content="北海道の地域課題に関する読み解きとアイデアの記事一覧。週次更新。">
<meta property="og:type" content="website">

<link rel="stylesheet" href="/articles/_article_styles.css">
<style>
  .index-wrap{max-width:880px;margin:0 auto;padding:50px 24px 80px}
  .idx-head{margin:24px 0 36px;padding-bottom:24px;border-bottom:2px solid var(--ink)}
  .idx-head h1{font-size:30px;font-weight:900;letter-spacing:-.01em;line-height:1.3;margin-bottom:10px}
  .idx-head p{font-size:14px;color:var(--slate);line-height:1.7}
  .idx-filter-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
  .idx-filter{
    font-family:inherit;cursor:pointer;background:var(--paper);
    font-size:11.5px;font-weight:700;color:var(--ink);
    border:1px solid var(--line);padding:6px 13px;border-radius:30px;
    transition:all .12s;
  }
  .idx-filter:hover{border-color:var(--ink)}
  .idx-filter[aria-pressed="true"]{background:var(--ink);color:var(--snow);border-color:var(--ink)}
  .idx-list{display:flex;flex-direction:column;gap:10px}
  .idx-item{
    background:var(--paper);border:1px solid var(--line);border-radius:6px;
    padding:16px 20px;display:flex;flex-direction:column;gap:7px;
    text-decoration:none;color:inherit;transition:all .12s;
  }
  .idx-item:hover{border-color:var(--moss);background:#fff;transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.04)}
  .idx-meta-row{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--slate);font-weight:600;flex-wrap:wrap}
  .idx-cat{
    font-size:10px;font-weight:800;color:var(--snow);background:#6B5B95;
    padding:2px 9px;border-radius:3px;letter-spacing:.04em;
  }
  .idx-cat.discovery{background:#B5733A}
  .idx-cat.idea{background:var(--ice)}
  .idx-title{font-size:16px;font-weight:800;color:var(--ink);line-height:1.45}
  .idx-summary{font-size:12.5px;color:var(--slate);line-height:1.65}
  .idx-empty{padding:40px 0;text-align:center;color:var(--slate);font-size:13px}
  @media(max-width:560px){
    .index-wrap{padding:32px 18px 60px}
    .idx-head h1{font-size:23px}
  }
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3FN8N9DLPP"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3FN8N9DLPP');

<body>
<div class="index-wrap">
<div class="back-links">
<a class="back-link" href="/">← トップへ戻る</a>
</div>

<header class="idx-head">
<h1>読み物 一覧</h1>
<p>移住定住・ふるさと納税・空き家・子どもの貧困・食料自給・一次産業の担い手・採用難・若者の地域離脱等のテーマを、構造から読み解き、海士町・神山町・尾道・沖縄・鯖江市等の長期事例から学ぶ。実践アイデアと、わたしたちにできることまで含めた深掘り読み物。</p>
</header>

<div class="idx-filter-row" id="idx-filter-row"></div>

<div class="idx-list" id="idx-list">
<div class="idx-empty">記事を読み込み中...</div>
</div>

<div class="back-links back-links-bottom">
<a class="back-link" href="/">← トップへ戻る</a>
</div>

<footer>
<p>運営: Largo 株式会社 ( <a href="https://lrg.jp" target="_blank" rel="noopener">lrg.jp</a> )</p>

<p><a href="/terms.html">利用規約</a>・<a href="/privacy.html">プライバシーポリシー</a></p>
</footer>
</div>

<script src="/data.js"></script>
<script>
(function(){
  if(typeof ARTICLES === 'undefined' || !ARTICLES.length){
    document.getElementById('idx-list').innerHTML = '<div class="idx-empty">まだ記事がありません。</div>';
    return;
  }

  function esc(s){ return String(s||"").replace(/[<>&"]/g, function(c){
    return {"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c];
  });}

  // 質重視: quality スコア降順 → 同点は新着順
  const sorted = [...ARTICLES].sort((a,b)=>{
    const qd = (b.quality||0) - (a.quality||0);
    if(qd !== 0) return qd;
    return (b.publishedAt||'').localeCompare(a.publishedAt||'');
  });
  const cats = ["すべて", ...Array.from(new Set(sorted.map(a=>a.category)))];

  let activeCat = "すべて";

  const filterRow = document.getElementById('idx-filter-row');
  filterRow.innerHTML = cats.map(c => `<button class="idx-filter" data-cat="${esc(c)}" aria-pressed="${c==='すべて'}">${esc(c)}</button>`).join('');

  function render(){
    const list = activeCat === "すべて" ? sorted : sorted.filter(a => a.category === activeCat);
    const out = document.getElementById('idx-list');
    if(!list.length){
      out.innerHTML = '<div class="idx-empty">該当する記事はありません。</div>';
      return;
    }
    out.innerHTML = list.map(a=>{
      const catCls = a.category === '課題発見' ? 'discovery' : (a.category === 'アイデア' ? 'idea' : '');
      return `<a class="idx-item" href="/articles/${esc(a.id)}.html">
        <div class="idx-meta-row">
          <span class="idx-cat ${catCls}">${esc(a.category)}</span>
          <span>${esc(a.publishedAt || '')}</span>
          <span>${a.readMinutes || 2} 分で読める</span>
        </div>
        <div class="idx-title">${esc(a.title)}</div>
        <div class="idx-summary">${esc(a.summary || '')}</div>
      </a>`;
    }).join('');
  }
  render();

  filterRow.addEventListener('click', e=>{
    const b = e.target.closest('[data-cat]'); if(!b) return;
    activeCat = b.dataset.cat;
    filterRow.querySelectorAll('[data-cat]').forEach(x=>x.setAttribute('aria-pressed', x.dataset.cat === activeCat));
    render();
    if(window.gtag) gtag('event','article_list_filter',{category:activeCat});
  });
})();
</script>
</body>
</html>
